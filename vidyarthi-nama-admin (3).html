<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Admin — विद्यार्थीनामा</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Mukta:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{--k:#E8650A;--kd:#C2540A;--r:#9B1C1C;--rd:#7F1D1D;--rp:#5C0A0A;--g:#F59E0B;--cr:#FFF8F0;--ok:#1E8E3E}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Mukta',sans-serif;background:var(--cr);color:#1A0A00}
.topbar{background:linear-gradient(135deg,var(--rp),var(--r));color:#fff;padding:1rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem}
.topbar h1{font-family:'Baloo 2',sans-serif;font-size:1.1rem}
.wrap{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
#loginBox{max-width:360px;margin:4rem auto;background:#fff;padding:2rem;border-radius:14px;box-shadow:0 6px 24px rgba(0,0,0,.12);text-align:center}
#loginBox input{width:100%;padding:.7rem;border:1.5px solid #E8CBB0;border-radius:8px;margin:.6rem 0;font-family:inherit}
#loginBox button{width:100%;background:var(--k);color:#fff;border:none;padding:.7rem;border-radius:8px;font-weight:700;cursor:pointer;margin-top:.5rem}
#loginErr{color:var(--r);font-size:.82rem;margin-top:.5rem;display:none;word-break:break-word}
#jsErrorBox{display:none;position:fixed;top:0;left:0;right:0;background:#7F1D1D;color:#fff;padding:1rem;font-size:.8rem;z-index:99999;word-break:break-word;max-height:40vh;overflow:auto}
#app{display:none}
.filters{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.filters button{padding:.5rem 1rem;border:2px solid var(--k);background:#fff;color:var(--r);border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.85rem}
.filters button.active{background:var(--k);color:#fff}
.row{background:#fff;border-radius:12px;padding:1rem;margin-bottom:.9rem;box-shadow:0 3px 12px rgba(0,0,0,.06);border-left:4px solid var(--k)}
.row h3{font-family:'Baloo 2',sans-serif;font-size:.95rem;color:var(--rd)}
.meta{font-size:.78rem;color:#8a6a50;margin:.3rem 0}
.detail{display:none;margin-top:.7rem;padding-top:.7rem;border-top:1px dashed #eee;font-size:.83rem;line-height:1.7;white-space:pre-wrap}
.detail.open{display:block}
.detail b{color:var(--rd)}
.actions{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap}
.actions button{padding:.4rem .8rem;border:none;border-radius:6px;font-weight:700;font-size:.78rem;cursor:pointer;font-family:inherit}
.a-approve{background:#DCFCE7;color:#166534}
.a-reject{background:#FEE2E2;color:#991B1B}
.a-delete{background:#333;color:#fff}
.a-view{background:#EFF6FF;color:#1E40AF}
.empty{text-align:center;padding:3rem;color:#8a6a50}
.card{background:#fff;border-radius:12px;padding:1.2rem;box-shadow:0 3px 14px rgba(0,0,0,.07);margin-bottom:1rem}
.fg{margin-bottom:.8rem}
.fg label{display:block;font-size:.8rem;font-weight:700;color:var(--rd);margin-bottom:.3rem}
.fg input,.fg select,.fg textarea{width:100%;padding:.6rem .8rem;border:1.5px solid #E8CBB0;border-radius:8px;font-family:inherit;font-size:.88rem}
.fg textarea{min-height:160px}
.btn{background:var(--k);color:#fff;border:none;padding:.7rem 1.4rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit}
.msg{padding:.7rem;border-radius:8px;margin-top:.7rem;font-size:.85rem;display:none}
.msg.ok{display:block;background:#DCFCE7;color:#166534}
.msg.err{display:block;background:#FEE2E2;color:#991B1B}
</style>
</head>
<body>

<div id="jsErrorBox"></div>
<script>
window.addEventListener('error', function(e){
  var box = document.getElementById('jsErrorBox');
  box.style.display = 'block';
  box.textContent = '⚠️ पेज एरर: ' + (e.message||e) + (e.filename?(' | '+e.filename+':'+e.lineno):'');
});
</script>

<div id="loginBox">
  <i class="fas fa-shield-halved" style="font-size:2rem;color:var(--r)"></i>
  <h2 style="margin:.7rem 0;font-family:'Baloo 2',sans-serif">Admin Login</h2>
  <input type="email" id="adminEmail" placeholder="Admin Email">
  <input type="password" id="adminPw" placeholder="Admin Password">
  <button onclick="login()">प्रवेश करा</button>
  <div id="loginErr"></div>
</div>

<div id="app">
  <div class="topbar">
    <h1>📖 विद्यार्थीनामा — Admin</h1>
    <button onclick="logout()" style="background:none;border:1px solid #fff;color:#fff;padding:.4rem .9rem;border-radius:6px;cursor:pointer">Logout</button>
  </div>
  <div class="wrap">
    <div class="filters">
      <button class="active" data-view="pending" onclick="setStatus('pending')">Pending</button>
      <button data-view="approved" onclick="setStatus('approved')">Approved</button>
      <button data-view="rejected" onclick="setStatus('rejected')">Rejected</button>
      <button data-view="guidance" onclick="showGuidanceList()">📚 माझे मार्गदर्शन लेख</button>
      <button data-view="add" onclick="showAddArticle()">✍️ नवीन लेख पोस्ट करा</button>
    </div>

    <div id="listView">
      <div id="list"><div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div></div>
    </div>

    <div id="guidanceListView" style="display:none">
      <div id="guidanceList"><div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div></div>
    </div>

    <div id="addArticleView" style="display:none">
      <div class="card">
        <h2 style="font-family:'Baloo 2',sans-serif;color:var(--r);margin-bottom:1rem" id="articleFormTitle">✍️ नवीन मार्गदर्शनपर लेख पोस्ट करा</h2>
        <input type="hidden" id="aEditId">
        <div class="fg">
          <label>श्रेणी</label>
          <select id="aCategory">
            <option value="मार्गदर्शन">मार्गदर्शनपर लेख</option>
            <option value="पुस्तक">पुस्तक / प्रकाशन</option>
          </select>
        </div>
        <div class="fg"><label>शीर्षक</label><input id="aTitle"></div>
        <div class="fg"><label>लेखकाचे नाव</label><input id="aAuthor"></div>
        <div class="fg"><label>लेखकाचे पदनाम (ऐच्छिक — उदा. प्राचार्य, XYZ कॉलेज)</label><input id="aDesignation" placeholder="पदनाम / हुद्दा"></div>
        <div class="fg"><label>लेख/पुस्तक परिचय मजकूर</label><textarea id="aContent"></textarea></div>

        <div class="fg">
          <label>लेखकाचा फोटो (ऐच्छिक)</label>
          <input type="file" id="aAuthorPhotoInput" accept="image/*">
          <div id="aAuthorPhotoPreview" style="margin-top:.5rem"></div>
        </div>

        <div class="fg">
          <label>प्रातिनिधिक छायाचित्र / मुखपृष्ठ (ऐच्छिक)</label>
          <input type="file" id="aImageInput" accept="image/*">
          <div id="aImagePreview" style="margin-top:.5rem"></div>
        </div>

        <div class="fg">
          <label>PDF अपलोड (ऐच्छिक — पुस्तक/प्रकाशनासाठी)</label>
          <input type="file" id="aPdfInput" accept="application/pdf">
          <div id="aPdfPreview" style="margin-top:.5rem;font-size:.82rem"></div>
        </div>

        <button class="btn" onclick="postArticle()" id="articleSubmitBtn">प्रकाशित करा</button>
        <button class="btn" onclick="cancelEdit()" id="cancelEditBtn" style="display:none;background:#888;margin-top:.5rem">रद्द करा</button>
        <div class="msg" id="articleMsg"></div>
      </div>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDD5o-yg5LDfvNuG8eyNh-WdH-GCSCRmYY",
  authDomain: "vidyarthi---manch.firebaseapp.com",
  projectId: "vidyarthi---manch",
  storageBucket: "vidyarthi---manch.firebasestorage.app",
  messagingSenderId: "455378425843",
  appId: "1:455378425843:web:1e2b594c03d966d7e92486"
};
try{ firebase.initializeApp(firebaseConfig); }catch(e){ document.getElementById('jsErrorBox').style.display='block'; document.getElementById('jsErrorBox').textContent='⚠️ '+e.message; }
const auth = firebase.auth();
const db = firebase.firestore();
let currentStatus = 'pending';
let items = [];
let guidanceItems = [];
let editingId = null;

const CLOUDINARY_CLOUD_NAME = 'gbsglqfq';
const CLOUDINARY_UPLOAD_PRESET = 'vidyarthi_manch';
async function uploadToCloudinary(file){
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, { method:'POST', body:fd });
  const out = await res.json();
  if(!out.secure_url) throw new Error(out.error?.message || 'Cloudinary upload अयशस्वी');
  return out.secure_url;
}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById('loginBox').style.display='none';
    document.getElementById('app').style.display='block';
    loadList();
  }
});
async function login(){
  const email = document.getElementById('adminEmail').value.trim();
  const pw = document.getElementById('adminPw').value.trim();
  const errEl = document.getElementById('loginErr');
  errEl.style.display='none';
  try{ await auth.signInWithEmailAndPassword(email, pw); }
  catch(err){ errEl.textContent = '❌ '+err.code+': '+err.message; errEl.style.display='block'; }
}
function logout(){ auth.signOut(); location.reload(); }

function switchView(view){
  document.getElementById('listView').style.display = view==='status' ? 'block' : 'none';
  document.getElementById('guidanceListView').style.display = view==='guidance' ? 'block' : 'none';
  document.getElementById('addArticleView').style.display = view==='add' ? 'block' : 'none';
}
function setStatus(s){
  currentStatus = s;
  switchView('status');
  [...document.querySelectorAll('.filters button')].forEach(b=>b.classList.remove('active'));
  document.querySelector('.filters button[data-view="'+s+'"]').classList.add('active');
  loadList();
}
function showAddArticle(){
  switchView('add');
  [...document.querySelectorAll('.filters button')].forEach(b=>b.classList.remove('active'));
  document.querySelector('.filters button[data-view="add"]').classList.add('active');
  resetArticleForm();
}
function showGuidanceList(){
  switchView('guidance');
  [...document.querySelectorAll('.filters button')].forEach(b=>b.classList.remove('active'));
  document.querySelector('.filters button[data-view="guidance"]').classList.add('active');
  loadGuidanceList();
}

async function loadList(){
  const el = document.getElementById('list');
  el.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div>';
  try{
    const snap = await db.collection('nama_posts').where('status','==',currentStatus).where('authorType','==','student').get();
    items = snap.docs.map(d=>({id:d.id, ...d.data()}));
    render();
  }catch(e){
    el.innerHTML = '<div class="empty">लोड करता आले नाही — ('+e.message+')</div>';
  }
}
function render(){
  const el = document.getElementById('list');
  if(!items.length){ el.innerHTML = '<div class="empty">या श्रेणीत काहीही नाही.</div>'; return; }
  el.innerHTML = items.map((i,idx)=>`
    <div class="row">
      <h3>${esc(i.title)} <span style="font-weight:400;font-size:.78rem;color:#8a6a50">(${esc(i.category)})</span></h3>
      <div class="meta">👤 ${esc(i.studentName)} | ${esc(i.studentSchool)} | ${esc(i.studentClass)}</div>
      <div class="actions">
        <button class="a-view" onclick="toggleDetail(${idx})"><i class="fas fa-eye"></i> तपशील</button>
        ${i.status!=='approved'?`<button class="a-approve" onclick="update('${i.id}',{status:'approved'})"><i class="fas fa-check"></i> Approve</button>`:''}
        ${i.status!=='rejected'?`<button class="a-reject" onclick="update('${i.id}',{status:'rejected'})"><i class="fas fa-xmark"></i> Reject</button>`:''}
        <button class="a-delete" onclick="del('${i.id}')"><i class="fas fa-trash"></i> Delete</button>
      </div>
      <div class="detail" id="detail-${idx}">
        <b>ईमेल:</b> ${esc(i.studentEmail)} | <b>संपर्क:</b> ${esc(i.studentContact)}
        ${i.category==='तांत्रिक प्रकल्प' ? `
        <br><b>उद्देश:</b> ${esc(i.techPurpose)}
        <br><b>प्रास्ताविक:</b> ${esc(i.techIntro)}
        <br><b>वैशिष्ट्ये:</b> ${esc(i.techFeatures)}
        <br><b>तंत्रज्ञान:</b> ${esc(i.techTech)}
        <br><b>निष्कर्ष:</b> ${esc(i.techConclusion)}
        <br><b>व्हिडिओ:</b> ${esc(i.videoLink)}
        ` : `<br><b>मजकूर:</b><br>${esc(i.content)}`}
        ${i.imageUrl?`<br><br><img src="${i.imageUrl}" style="max-width:200px;border-radius:8px">`:''}
        ${i.profilePhotoUrl?`<br><br><img src="${i.profilePhotoUrl}" style="width:60px;height:60px;border-radius:50%">`:''}
        <br><br><b>Views:</b> ${i.views||0} | <b>Likes:</b> ${i.likeCount||0} | <b>Dislikes:</b> ${i.dislikeCount||0} | <b>Comments:</b> ${i.commentCount||0} | <b>Shares:</b> ${i.shares||0}
      </div>
    </div>
  `).join('');
}
function toggleDetail(idx){ document.getElementById('detail-'+idx).classList.toggle('open'); }
async function update(id, patch){ await db.collection('nama_posts').doc(id).update(patch); loadList(); }
async function del(id){ if(!confirm('कायमची डिलीट करायची?')) return; await db.collection('nama_posts').doc(id).delete(); loadList(); loadGuidanceList(); }

/* ---------- मार्गदर्शन लेख यादी (admin-authored posts) ---------- */
async function loadGuidanceList(){
  const el = document.getElementById('guidanceList');
  el.innerHTML = '<div class="empty"><i class="fas fa-spinner fa-spin"></i> लोड होत आहे...</div>';
  try{
    const snap = await db.collection('nama_posts').where('authorType','==','admin').get();
    guidanceItems = snap.docs.map(d=>({id:d.id, ...d.data()}));
    guidanceItems.sort((a,b)=> (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0));
    renderGuidanceList();
  }catch(e){
    el.innerHTML = '<div class="empty">लोड करता आले नाही — ('+e.message+')</div>';
  }
}
function renderGuidanceList(){
  const el = document.getElementById('guidanceList');
  if(!guidanceItems.length){ el.innerHTML = '<div class="empty">अजून एकही मार्गदर्शनपर लेख पोस्ट केलेला नाही.</div>'; return; }
  el.innerHTML = `<div style="margin-bottom:.8rem;font-size:.85rem;color:#8a6a50">एकूण ${guidanceItems.length} लेख प्रकाशित</div>` + guidanceItems.map((i)=>`
    <div class="row">
      <h3>${esc(i.title)}</h3>
      <div class="meta">✍️ ${esc(i.guidanceAuthor||'')} ${i.guidanceDesignation?'• '+esc(i.guidanceDesignation):''}</div>
      <div class="meta">🗓 ${i.timestamp?.toDate ? i.timestamp.toDate().toLocaleString('mr-IN', {dateStyle:'medium', timeStyle:'short'}) : '—'}</div>
      <div class="meta">👁 ${i.views||0} views | 👍 ${i.likeCount||0} | 💬 ${i.commentCount||0} | 🔗 ${i.shares||0}</div>
      <div class="actions">
        <button class="a-view" onclick="editGuidance('${i.id}')"><i class="fas fa-pen"></i> Edit</button>
        <button class="a-delete" onclick="del('${i.id}')"><i class="fas fa-trash"></i> Delete</button>
      </div>
    </div>
  `).join('');
}
function editGuidance(id){
  const i = guidanceItems.find(x=>x.id===id);
  if(!i) return;
  editingId = id;
  document.getElementById('aCategory').value = i.category || 'मार्गदर्शन';
  document.getElementById('aTitle').value = i.title || '';
  document.getElementById('aAuthor').value = i.guidanceAuthor || '';
  document.getElementById('aDesignation').value = i.guidanceDesignation || '';
  document.getElementById('aContent').value = i.content || '';
  document.getElementById('aAuthorPhotoPreview').innerHTML = i.guidanceAuthorPhoto ? `<img src="${i.guidanceAuthorPhoto}" style="width:60px;height:60px;border-radius:50%">` : '';
  document.getElementById('aImagePreview').innerHTML = i.imageUrl ? `<img src="${i.imageUrl}" style="max-width:180px;border-radius:8px">` : '';
  document.getElementById('aPdfPreview').innerHTML = i.pdfUrl ? `<a href="${i.pdfUrl}" target="_blank">📄 सध्याची PDF पहा</a>` : '';
  document.getElementById('articleFormTitle').textContent = '✏️ लेख संपादित करा';
  document.getElementById('articleSubmitBtn').textContent = 'बदल जतन करा';
  document.getElementById('cancelEditBtn').style.display = 'block';
  switchView('add');
  [...document.querySelectorAll('.filters button')].forEach(b=>b.classList.remove('active'));
}
function resetArticleForm(){
  editingId = null;
  document.getElementById('aCategory').value = 'मार्गदर्शन';
  document.getElementById('aTitle').value = '';
  document.getElementById('aAuthor').value = '';
  document.getElementById('aDesignation').value = '';
  document.getElementById('aContent').value = '';
  document.getElementById('aAuthorPhotoInput').value = '';
  document.getElementById('aImageInput').value = '';
  document.getElementById('aPdfInput').value = '';
  document.getElementById('aAuthorPhotoPreview').innerHTML = '';
  document.getElementById('aImagePreview').innerHTML = '';
  document.getElementById('aPdfPreview').innerHTML = '';
  document.getElementById('articleFormTitle').textContent = '✍️ नवीन मार्गदर्शनपर लेख पोस्ट करा';
  document.getElementById('articleSubmitBtn').textContent = 'प्रकाशित करा';
  document.getElementById('cancelEditBtn').style.display = 'none';
}
function cancelEdit(){ resetArticleForm(); showGuidanceList(); }

async function postArticle(){
  const msg = document.getElementById('articleMsg');
  const category = document.getElementById('aCategory').value;
  const title = document.getElementById('aTitle').value;
  const author = document.getElementById('aAuthor').value;
  const designation = document.getElementById('aDesignation').value;
  const content = document.getElementById('aContent').value;
  if(!title || !content){ msg.textContent='शीर्षक व मजकूर आवश्यक आहे.'; msg.className='msg err'; return; }
  const btn = document.getElementById('articleSubmitBtn');
  btn.disabled = true; const origText = btn.textContent; btn.textContent = 'जतन होत आहे...';
  try{
    const authorPhotoFile = document.getElementById('aAuthorPhotoInput').files[0];
    const imageFile = document.getElementById('aImageInput').files[0];
    const pdfFile = document.getElementById('aPdfInput').files[0];
    const payload = { category, title, guidanceAuthor: author, guidanceDesignation: designation, content };
    if(authorPhotoFile) payload.guidanceAuthorPhoto = await uploadToCloudinary(authorPhotoFile);
    if(imageFile) payload.imageUrl = await uploadToCloudinary(imageFile);
    if(pdfFile) payload.pdfUrl = await uploadToCloudinary(pdfFile);

    if(editingId){
      await db.collection('nama_posts').doc(editingId).update(payload);
      msg.textContent = '✅ लेख अपडेट झाला!'; msg.className='msg ok';
    } else {
      await db.collection('nama_posts').add({
        authorType:'admin', status:'approved',
        ...payload,
        views: 0, shares: 0, likeCount: 0, dislikeCount: 0, commentCount: 0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      msg.textContent = '✅ प्रकाशित झाले!'; msg.className='msg ok';
    }
    resetArticleForm();
    loadGuidanceList();
  }catch(err){
    msg.textContent = '❌ ' + err.message; msg.className='msg err';
  }
  btn.disabled = false; btn.textContent = origText;
}
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
